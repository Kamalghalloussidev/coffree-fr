<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="COFFREE.FR - Site et application mobile en cours de construction">
    <title>COFFREE.FR - En cours de construction</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div class="container">
        <div class="content">
            <!-- Logo -->
            <div class="logo">
                <img src="assets/images/logo.jpeg" alt="COFFREE.FR Logo">
            </div>

            <!-- Titre principal -->
            <h1>COFFREE.FR</h1>
            
            <!-- Message -->
            <p class="main-message">Site en cours de construction</p>
            
            <!-- Séparateur -->
            <div class="separator"></div>
            
            <!-- Applications mobiles -->
            <div class="mobile-section">
                <h2>Applications mobiles bientôt disponibles</h2>
                <div class="platforms">
                    <div class="platform">
                        <img src="assets/svg/android-logo-2.svg" alt="Android" class="platform-icon">
                        <span>Android</span>
                    </div>
                    <div class="platform">
                        <img src="assets/svg/apple-13.svg" alt="iOS" class="platform-icon">
                        <span>iOS</span>
                    </div>
                </div>
            </div>

            <!-- Message de pied -->
            <p class="footer-message">Nous travaillons activement sur quelque chose d'exceptionnel</p>
        </div>
    </div>

    <!-- Scripts JavaScript -->
    <script src="assets/js/main.js"></script>
</body>
</html>
